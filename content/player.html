<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WESPA Player Profile | Dynamic Player Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fc;
            color: #1e2a3e;
            line-height: 1.5;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        .loader {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2rem;
            color: #2c5f8a;
        }

        .error-box {
            background: #fee2e2;
            border-left: 6px solid #c00;
            padding: 20px;
            border-radius: 16px;
            margin: 30px 0;
        }

        /* Player Header */
        .player-header {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
            padding: 24px 28px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .player-info {
            flex: 2;
        }

        .player-name {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .country-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #eef2fa;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .country-badge img {
            width: 26px;
            height: auto;
            border-radius: 2px;
        }

        .player-photo {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            background: #e9ecef;
        }

        /* Stats Grid */
        .stats-grid {
            background: white;
            border-radius: 28px;
            padding: 20px 28px;
            margin-bottom: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 8px;
        }

        .stat-card {
            background: #f8fafd;
            border-radius: 20px;
            padding: 14px 18px;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #5b6e8c;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e4663;
            line-height: 1.2;
        }

        .stat-value-small {
            font-size: 1rem;
            font-weight: 500;
            color: #5b6e8c;
            margin-top: 4px;
        }

        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 20px 0 8px;
        }

        /* Tables */
        .tournament-table, .headtohead-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .tournament-table th, .headtohead-table th {
            text-align: left;
            padding: 14px 8px 10px 0;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 2px solid #e0e9f0;
        }

        .tournament-table td, .headtohead-table td {
            padding: 12px 8px 12px 0;
            border-bottom: 1px solid #edf2f7;
            vertical-align: top;
        }

        .expand-btn {
            background: #eef2ff;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.1s;
            color: #1f6392;
        }

        .expand-btn:hover {
            background: #dfe6f5;
        }

        .expand-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .rounds-table {
            width: 100%;
            margin-top: 12px;
            background: #fafcff;
            border-radius: 16px;
            overflow: hidden;
            font-size: 0.85rem;
        }

        .rounds-table th, .rounds-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #e2edf2;
        }

        .collapse-row {
            display: none;
        }

        .badge-win {
            color: #2b7a3e;
            font-weight: 700;
        }

        .badge-loss {
            color: #bc4e2c;
        }

        .badge-draw {
            color: #e68a2e;
        }

        .footer-note {
            margin-top: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: #6c86a3;
            border-top: 1px solid #e0e9f0;
            padding-top: 24px;
        }

        @media (max-width: 700px) {
            .app-container { padding: 16px; }
            .player-name { font-size: 1.6rem; }
            .stats-row { grid-template-columns: 1fr 1fr; }
            .tournament-table { font-size: 0.75rem; }
        }

        .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            color: #5a6e8a;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
        }

        .tab-btn.active {
            color: #1f6392;
            border-bottom-color: #1f6392;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        /* Rating Timeline */
        .timeline-panel {
            background: white;
            border-radius: 24px;
            padding: 24px 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .timeline-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 18px;
        }

        .timeline-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1e4663;
        }

        .timeline-description {
            color: #6c86a3;
            font-size: 0.86rem;
            margin-top: 4px;
        }

        .timeline-chart-wrap {
            position: relative;
            height: 390px;
            width: 100%;
        }

        .timeline-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .timeline-summary-card {
            background: #f8fafd;
            border-radius: 16px;
            padding: 13px 16px;
        }

        .timeline-summary-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #5b6e8c;
            letter-spacing: 0.45px;
        }

        .timeline-summary-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e4663;
            margin-top: 2px;
        }

        .timeline-empty {
            min-height: 260px;
            display: grid;
            place-items: center;
            text-align: center;
            color: #6c86a3;
            background: #f8fafd;
            border-radius: 18px;
            padding: 24px;
        }

        @media (max-width: 700px) {
            .timeline-panel { padding: 20px 16px; }
            .timeline-chart-wrap { height: 310px; }
        }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div id="loadingView" class="loader">
        <i class="fas fa-spinner fa-pulse fa-2x"></i>
        <p>Loading player data...</p>
    </div>
    <div id="mainContent" style="display: none;"></div>
</div>

<script>
    // API endpoint (uses nginx reverse proxy, so relative path)
    const API_BASE = '/api';
    
    // New v2 endpoints
    const getPlayerUrl = (playerId) => `${API_BASE}/v2/player/${playerId}`;
    const getTournamentUrl = (playerId, tourneyId) => `${API_BASE}/v2/player/${playerId}/tournaments/${tourneyId}`;

    // Get player ID from URL (?id=3039)
    function getPlayerIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id') || params.get('player');
    }

    // Fetch player summary from v2 endpoint
    async function fetchPlayerSummary(playerId) {
        const url = getPlayerUrl(playerId);
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        const data = await response.json();
        if (!data || !data.playerid) throw new Error('Invalid player data');
        return data;
    }

    // Lazy-load tournament games from v2 endpoint
    async function fetchTournamentGames(playerId, tourneyId) {
        const url = getTournamentUrl(playerId, tourneyId);
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        return await response.json();
    }

    // Render title badge (only if title is present)
    function renderTitleBadge(title) {
        if (!title) return '';
        const titleMap = {
            'M': 'Master',
            'IM': 'International Master',
            'GM': 'Grandmaster'
        };
        const displayName = titleMap[title] || title;
        return `<span class="country-badge" style="background: #1f6392; color: white;">${escapeHtml(displayName)}</span>`;
    }

    // Render player header
    function renderPlayerHeader(data) {
        const countryCode = data.country || 'USA';
        const flagUrl = `https://wespa.xerafin.net/flags/${countryCode}.png`;
        const photoUrl = data.photourl || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name)}&background=1f6392&color=fff&rounded=true&size=120`;
        
        return `
            <div class="player-header">
                <div class="player-info">
                    <div class="player-name">
                        ${escapeHtml(data.name)}
                        <span class="country-badge">
                            <img src="${flagUrl}" alt="${countryCode}" onerror="this.src='https://flagcdn.com/w320/us.png'"> ${countryCode}
                        </span>
                        ${renderTitleBadge(data.title)}
                    </div>
                    <div style="margin-top: 12px; opacity:0.8;">
                        <i class="fas fa-id-card"></i> WESPA ID: ${data.playerid} &nbsp;|&nbsp;
                        <i class="fas fa-chart-line"></i> Current Rating: <strong>${data.cswrating || '—'}</strong>
                    </div>
                </div>
                <img class="player-photo" src="${photoUrl}" alt="${data.name}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(data.name)}&background=90b4d9&color=fff'">
            </div>
        `;
    }

    // Render stats grid from v2 stats object
    function renderStatsGrid(stats) {
        if (!stats) return '<div class="stats-grid">No statistics available</div>';
        
        return `
            <div class="stats-grid">
                <div class="stats-row">
                    <div class="stat-card"><div class="stat-label">Games Played</div><div class="stat-value">${stats.gamesPlayed || 0}</div></div>
                    <div class="stat-card"><div class="stat-label">Win / Loss / Draw</div><div class="stat-value">${stats.wins || 0} / ${stats.losses || 0} / ${stats.draws || 0}</div></div>
                    <div class="stat-card"><div class="stat-label">Win %</div><div class="stat-value">${stats.winPercentage || 0}%</div></div>
                    <div class="stat-card"><div class="stat-label">Avg Score</div><div class="stat-value">${stats.averageScore || '—'}</div></div>
                    <div class="stat-card"><div class="stat-label">Avg Against</div><div class="stat-value">${stats.averageAgainst || '—'}</div></div>
                </div>
                <div class="divider"></div>
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-label">High Game</div>
                        <div class="stat-value">${stats.highGame || '—'}</div>
                        <div class="stat-value-small">${stats.highGameOpponent ? `vs ${escapeHtml(stats.highGameOpponent)}` : ''}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Low Game</div>
                        <div class="stat-value">${stats.lowGame || '—'}</div>
                        <div class="stat-value-small">${stats.lowGameOpponent ? `vs ${escapeHtml(stats.lowGameOpponent)}` : ''}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Largest Spread</div>
                        <div class="stat-value">${stats.biggestWin || '—'}</div>
                        <div class="stat-value-small">${stats.biggestWinOpponent ? `vs ${escapeHtml(stats.biggestWinOpponent)}` : ''}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">High Loss</div>
                        <div class="stat-value">${stats.highLoss || '—'}</div>
                        <div class="stat-value-small">${stats.highLossOpponent ? `vs ${escapeHtml(stats.highLossOpponent)}` : ''}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Low Win</div>
                        <div class="stat-value">${stats.lowWin || '—'}</div>
                        <div class="stat-value-small">${stats.lowWinOpponent ? `vs ${escapeHtml(stats.lowWinOpponent)}` : ''}</div>
                    </div>
                </div>
                <div class="stats-row">
                    <div class="stat-card"><span class="stat-label">＜300</span> <span class="stat-value" style="font-size:1.3rem">${stats.gamesUnder300 || 0}</span></div>
                    <div class="stat-card"><span class="stat-label">300-399</span> <span class="stat-value" style="font-size:1.3rem">${stats.games300to399 || 0}</span></div>
                    <div class="stat-card"><span class="stat-label">400-499</span> <span class="stat-value" style="font-size:1.3rem">${stats.games400to499 || 0}</span></div>
                    <div class="stat-card"><span class="stat-label">500-599</span> <span class="stat-value" style="font-size:1.3rem">${stats.games500to599 || 0}</span></div>
                    <div class="stat-card"><span class="stat-label">600+</span> <span class="stat-value" style="font-size:1.3rem">${stats.games600plus || 0}</span></div>
                </div>
            </div>
        `;
    }

    // Generate rounds table HTML from v2 rounds data
    function generateRoundsTable(rounds, tournamentName, tournamentDate) {
        if (!rounds || rounds.length === 0) {
            return '<p style="padding: 16px;">No game data available for this tournament.</p>';
        }
        
        return `
            <div style="padding: 16px; background: #f9fafb; border-radius: 12px;">
                <strong>${escapeHtml(tournamentName)} (${tournamentDate})</strong>
                <table class="rounds-table" style="width:100%; margin-top: 12px;">
                    <thead>
                        <tr><th>Round</th><th>Opponent</th><th>Opponent Rating</th><th>Result</th><th>Score</th><th>Opp Score</th><th>Player Rating</th></tr>
                    </thead>
                    <tbody>
                        ${rounds.map(r => `
                            <tr>
                                <td>${r.round}</td>
                                <td><a href="?id=${r.opponent_id}" style="color: #1f6392; text-decoration: none;">${escapeHtml(r.opponent_name)}</a></td>
                                <td>${r.opponent_rating || '—'}</td>
                                <td class="${r.result === 'W' ? 'badge-win' : (r.result === 'L' ? 'badge-loss' : 'badge-draw')}">
                                    <strong>${r.result}</strong>
                                </td>
                                <td>${r.score_for}</td>
                                <td>${r.score_against}</td>
                                <td>${r.player_rating_at_time || '—'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    // Load tournament games on demand
    async function loadTournamentGames(playerId, tourneyId, buttonElement, targetRowId, tournamentName, tournamentDate) {
        buttonElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
        buttonElement.disabled = true;
        
        try {
            const data = await fetchTournamentGames(playerId, tourneyId);
            
            const roundsHtml = generateRoundsTable(data.rounds, tournamentName, tournamentDate);
            const targetRow = document.getElementById(targetRowId);
            if (targetRow) {
                targetRow.innerHTML = `<td colspan="10">${roundsHtml}</td>`;
            }
            
            buttonElement.innerHTML = '<i class="fas fa-minus-circle"></i> Hide';
            buttonElement.disabled = false;
            buttonElement.setAttribute('data-loaded', 'true');
            
        } catch (error) {
            console.error('Error loading tournament games:', error);
            buttonElement.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Retry';
            buttonElement.disabled = false;
            
            const targetRow = document.getElementById(targetRowId);
            if (targetRow && targetRow.innerHTML.includes('Loading')) {
                targetRow.innerHTML = `<td colspan="10"><div class="error-box" style="margin: 10px;">Failed to load games: ${error.message}</div></td>`;
            }
        }
    }

    // Build tournament table with lazy-load buttons
    function buildTournamentsTable(tournaments, playerId) {
        if (!tournaments || tournaments.length === 0) {
            return '<div class="stats-grid">No tournament data found.</div>';
        }
        
        let rows = '';
        tournaments.forEach((t) => {
            const uniqueId = `tourney-${t.tourneyid}`;
            const changeClass = t.ratingChange >= 0 ? 'style="color:#2b7a3e"' : 'style="color:#bc4e2c"';
            const record = `${t.wins || 0}-${t.losses || 0}${t.draws ? `-${t.draws}` : ''}`;
            
            rows += `
                <tr data-tourney-id="${t.tourneyid}">
                    <td>
                        <button class="expand-btn" 
                                data-player="${playerId}"
                                data-tourney="${t.tourneyid}"
                                data-target="${uniqueId}"
                                data-name="${escapeHtml(t.name)}"
                                data-date="${t.date}">
                            <i class="fas fa-plus-circle"></i> Details
                        </button>
                    </td>
         	    <td><a href="tournament.html?id=${t.tourneyid}" style="color: #1f6392; text-decoration: none;">${escapeHtml(t.name || '—')}</a></td>
                    <td>${t.date || '—'}</td>
                    <td>${record}</td>
                    <td>${t.spread || 0}</td>
                    <td>${t.averageScore || '—'}</td>
                    <td>${t.averageAgainst || '—'}</td>
                    <td>${t.place || '—'}</td>
                    <td>${t.endRating || '—'}</td>
                    <td ${changeClass}>${t.ratingChange > 0 ? `+${t.ratingChange}` : t.ratingChange || 0}</td>
                </tr>
                <tr class="collapse-row" id="${uniqueId}" style="display: none;">
                    <td colspan="10"><div style="text-align: center; padding: 20px;"><i class="fas fa-spinner fa-pulse"></i> Loading games...</div></td>
                </tr>
            `;
        });
        
        return `
            <div style="overflow-x: auto; background: white; border-radius: 24px; padding: 0;">
                <table class="tournament-table" style="width: 100%;">
                    <thead>
                        <tr><th></th><th>Tournament</th><th>Date</th><th>W-L-B</th><th>Spread</th><th>Avg For</th><th>Avg Against</th><th>Place</th><th>End Rating</th><th>Change</th></tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            </div>
        `;
    }


    // Rating timeline state
    let ratingChartInstance = null;
    let ratingTimelineTournaments = [];

    function toNumber(value) {
        if (value === null || value === undefined || value === '') return null;
        const number = Number(value);
        return Number.isFinite(number) ? number : null;
    }

    function formatTimelineDate(dateValue) {
        if (!dateValue) return '—';

        const match = String(dateValue).match(/^(\d{4})-(\d{2})-(\d{2})/);
        let date;

        if (match) {
            date = new Date(Date.UTC(
                Number(match[1]),
                Number(match[2]) - 1,
                Number(match[3]),
                12
            ));
        } else {
            date = new Date(dateValue);
        }

        if (Number.isNaN(date.getTime())) return String(dateValue);

        return new Intl.DateTimeFormat('en-GB', {
            day: '2-digit',
            month: 'short',
            year: 'numeric',
            timeZone: 'UTC'
        }).format(date);
    }

    function prepareRatingTimeline(tournaments) {
        if (!Array.isArray(tournaments)) return [];

        const timeline = tournaments
            .map((t, index) => {
                const endRating = toNumber(t.endRating ?? t.end_rating);
                const ratingChange = toNumber(t.ratingChange ?? t.rating_change);
                let startRating = toNumber(t.startRating ?? t.start_rating);

                if (startRating === null && endRating !== null && ratingChange !== null) {
                    startRating = endRating - ratingChange;
                }

                const rawDate = t.date || t.end_date || t.start_date || '';
                const timestamp = Date.parse(rawDate);

                return {
                    index,
                    name: t.name || t.tournamentName || t.tournament_name || 'Unnamed tournament',
                    date: rawDate,
                    timestamp: Number.isFinite(timestamp) ? timestamp : null,
                    division: t.division || t.division_name || '—',
                    startRating,
                    endRating,
                    ratingChange,
                    voidedAt2006Cutoff: false
                };
            })
            .filter(t => t.timestamp !== null && t.endRating !== null)
            .sort((a, b) => {
                if (a.timestamp !== b.timestamp) return a.timestamp - b.timestamp;
                return a.index - b.index;
            });

        /*
         * Legacy-history rule:
         * Only when records exist before 1 January 2006, void the first point
         * dated within calendar year 2006. If the player has no tournament
         * between 1 January and 31 December 2006, no point is voided.
         */
        const start2006 = Date.UTC(2006, 0, 1);
        const start2007 = Date.UTC(2007, 0, 1);
        const hasPre2006History = timeline.some(t => t.timestamp < start2006);

        if (hasPre2006History) {
            const firstPointIn2006 = timeline.find(
                t => t.timestamp >= start2006 && t.timestamp < start2007
            );

            if (firstPointIn2006) {
                firstPointIn2006.voidedAt2006Cutoff = true;
            }
        }

        return timeline;
    }

    function buildRatingTimelineTab(tournaments) {
        ratingTimelineTournaments = prepareRatingTimeline(tournaments);

        const validTimelinePoints = ratingTimelineTournaments.filter(
            t => !t.voidedAt2006Cutoff
        );

        if (validTimelinePoints.length === 0) {
            return `
                <div class="timeline-panel">
                    <div class="timeline-header">
                        <div>
                            <div class="timeline-title">
                                <i class="fas fa-chart-line"></i> Rating Timeline
                            </div>
                            <div class="timeline-description">
                                Official ending rating after each recorded tournament.
                            </div>
                        </div>
                    </div>
                    <div class="timeline-empty">
                        <div>
                            <i class="fas fa-chart-area fa-3x" style="color:#90b4d9; margin-bottom:14px;"></i>
                            <p>No rating history is available for this player.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        const first = validTimelinePoints[0];
        const latest = validTimelinePoints[validTimelinePoints.length - 1];
        const firstRating = first.startRating ?? first.endRating;

        const absolutePeak = validTimelinePoints.reduce(
            (best, item) => item.endRating > best.endRating ? item : best,
            validTimelinePoints[0]
        );


        // Rolling two-year window ending today.
        const twoYearCutoff = new Date();
        twoYearCutoff.setHours(0, 0, 0, 0);
        twoYearCutoff.setFullYear(twoYearCutoff.getFullYear() - 2);

        const twoYearPoints = validTimelinePoints.filter(
            item => item.timestamp >= twoYearCutoff.getTime()
        );

        const twoYearPeak = twoYearPoints.length
            ? twoYearPoints.reduce(
                (best, item) => item.endRating > best.endRating ? item : best,
                twoYearPoints[0]
            )
            : null;


        const twoYearPeakValue = twoYearPeak ? twoYearPeak.endRating : '—';
        const twoYearPeakDate = twoYearPeak
            ? formatTimelineDate(twoYearPeak.date)
            : 'No rated tournament in the last 2 years';

        const currentVsTwoYearPeak = twoYearPeak
            ? latest.endRating - twoYearPeak.endRating
            : null;

        const currentVsTwoYearPeakText = currentVsTwoYearPeak === null
            ? '—'
            : (currentVsTwoYearPeak > 0
                ? `+${currentVsTwoYearPeak}`
                : String(currentVsTwoYearPeak));

        const currentVsTwoYearPeakColour = currentVsTwoYearPeak === null
            ? '#5b6e8c'
            : (currentVsTwoYearPeak >= 0 ? '#2b7a3e' : '#bc4e2c');

        return `
            <div class="timeline-panel">
                <div class="timeline-header">
                    <div>
                        <div class="timeline-title">
                            <i class="fas fa-chart-line"></i> Rating Timeline
                        </div>
                        <div class="timeline-description">
                            Official ending rating after each tournament. Hover over a point for details.
                        </div>
                    </div>
                </div>

                <div class="timeline-chart-wrap">
                    <canvas id="ratingTimelineChart" aria-label="Player rating timeline"></canvas>
                </div>

                <div class="timeline-summary">
                    <div class="timeline-summary-card">
                        <div class="timeline-summary-label">Current</div>
                        <div class="timeline-summary-value">${latest.endRating}</div>
                    </div>
                    <div class="timeline-summary-card">
                        <div class="timeline-summary-label">Peak (2-year)</div>
                        <div class="timeline-summary-value">${twoYearPeakValue}</div>
                        <div class="stat-value-small">${twoYearPeakDate}</div>
                    </div>
                    <div class="timeline-summary-card">
                        <div class="timeline-summary-label">Current vs Peak (2-year)</div>
                        <div class="timeline-summary-value" style="color:${currentVsTwoYearPeakColour};">
                            ${currentVsTwoYearPeakText}
                        </div>
                        <div class="stat-value-small">
                            ${currentVsTwoYearPeak === null ? 'No 2-year peak available' : 'Current minus 2-year peak'}
                        </div>
                    </div>
                    <div class="timeline-summary-card">
                        <div class="timeline-summary-label">Absolute Peak</div>
                        <div class="timeline-summary-value">${absolutePeak.endRating}</div>
                        <div class="stat-value-small">${formatTimelineDate(absolutePeak.date)}</div>
                    </div>
                </div>
            </div>
        `;
    }

    function renderRatingTimelineChart() {
        const canvas = document.getElementById('ratingTimelineChart');
        if (!canvas || !window.Chart || ratingTimelineTournaments.length === 0) return;

        if (ratingChartInstance) {
            ratingChartInstance.resize();
            return;
        }

        const labels = ratingTimelineTournaments.map(t => formatTimelineDate(t.date));
        const values = ratingTimelineTournaments.map(
            t => t.voidedAt2006Cutoff ? null : t.endRating
        );

        /*
         * Draw a dotted bridge across the single voided 2006 point.
         * Only the valid point immediately before and immediately after the
         * void are populated in this second dataset.
         */
        const bridgeValues = new Array(ratingTimelineTournaments.length).fill(null);
        const voidedIndex = ratingTimelineTournaments.findIndex(
            t => t.voidedAt2006Cutoff
        );

        if (
            voidedIndex > 0 &&
            voidedIndex < ratingTimelineTournaments.length - 1
        ) {
            bridgeValues[voidedIndex - 1] =
                ratingTimelineTournaments[voidedIndex - 1].endRating;
            bridgeValues[voidedIndex + 1] =
                ratingTimelineTournaments[voidedIndex + 1].endRating;
        }

        const context = canvas.getContext('2d');
        const gradient = context.createLinearGradient(0, 0, 0, 390);
        gradient.addColorStop(0, 'rgba(31, 99, 146, 0.30)');
        gradient.addColorStop(1, 'rgba(31, 99, 146, 0.02)');

        ratingChartInstance = new Chart(context, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        label: 'WESPA Rating',
                        data: values,
                        borderColor: '#1f6392',
                        backgroundColor: gradient,
                        borderWidth: 3,
                        fill: true,
                        spanGaps: false,
                        tension: 0.18,
                        pointRadius: ratingTimelineTournaments.length > 80 ? 1.5 : 3,
                        pointHoverRadius: 6,
                        pointHitRadius: 12,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#1f6392',
                        pointBorderWidth: 2
                    },
                    {
                        label: 'Voided 2006 transition',
                        data: bridgeValues,
                        borderColor: '#1f6392',
                        borderWidth: 2,
                        borderDash: [6, 6],
                        fill: false,
                        spanGaps: true,
                        tension: 0,
                        pointRadius: 0,
                        pointHoverRadius: 0,
                        pointHitRadius: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'nearest',
                    intersect: false
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        displayColors: false,
                        padding: 12,
                        filter(item) {
                            return item.datasetIndex === 0;
                        },
                        callbacks: {
                            title(items) {
                                const index = items[0]?.dataIndex;
                                return ratingTimelineTournaments[index]?.name || '';
                            },
                            label(item) {
                                const point = ratingTimelineTournaments[item.dataIndex];
                                const change = point.ratingChange;
                                const changeText = change === null
                                    ? '—'
                                    : (change > 0 ? `+${change}` : String(change));

                                const lines = [
                                    `Date: ${formatTimelineDate(point.date)}`,
                                    `Rating: ${point.startRating ?? '—'} → ${point.endRating}`,
                                    `Change: ${changeText}`
                                ];

                                if (point.division && point.division !== '—') {
                                    lines.push(`Division: ${point.division}`);
                                }

                                return lines;
                            }
                        }
                    },
                    decimation: {
                        enabled: true,
                        algorithm: 'lttb',
                        samples: 250
                    }
                },
                scales: {
                    x: {
                        grid: {
                            color: 'rgba(90, 110, 138, 0.08)'
                        },
                        ticks: {
                            maxTicksLimit: 10,
                            maxRotation: 0,
                            autoSkip: true
                        },
                        title: {
                            display: true,
                            text: 'Tournament Date'
                        }
                    },
                    y: {
                        grace: '8%',
                        grid: {
                            color: 'rgba(90, 110, 138, 0.12)'
                        },
                        ticks: {
                            precision: 0
                        },
                        title: {
                            display: true,
                            text: 'WESPA Rating'
                        }
                    }
                }
            }
        });
    }

    // Head-to-head placeholder (can be expanded later)
    function buildHeadToHeadPlaceholder() {
        return `
            <div class="stats-grid" style="text-align: center; padding: 40px;">
                <i class="fas fa-chart-line" style="font-size: 48px; color: #90b4d9; margin-bottom: 16px; display: block;"></i>
                <h3>Head-to-Head Statistics</h3>
                <p>Head-to-head data will be available in a future update.<br>
                Click on any tournament above to see game-by-game results.</p>
            </div>
        `;
    }

    // Attach lazy-load event listeners
    function attachLazyLoadEvents() {
        document.querySelectorAll('.expand-btn').forEach(btn => {
            // Remove existing listeners to avoid duplicates
            btn.removeEventListener('click', btn._listener);
            
            const handler = async (e) => {
                e.preventDefault();
                const targetId = btn.getAttribute('data-target');
                const tourneyId = btn.getAttribute('data-tourney');
                const playerId = btn.getAttribute('data-player');
                const tournamentName = btn.getAttribute('data-name');
                const tournamentDate = btn.getAttribute('data-date');
                const targetRow = document.getElementById(targetId);
                
                if (!targetRow) return;
                
                if (targetRow.style.display !== 'none') {
                    targetRow.style.display = 'none';
                    btn.innerHTML = '<i class="fas fa-plus-circle"></i> Details';
                    return;
                }
                
                if (btn.getAttribute('data-loaded') === 'true') {
                    targetRow.style.display = 'table-row';
                    btn.innerHTML = '<i class="fas fa-minus-circle"></i> Hide';
                    return;
                }
                
                targetRow.style.display = 'table-row';
                await loadTournamentGames(playerId, tourneyId, btn, targetId, tournamentName, tournamentDate);
            };
            
            btn._listener = handler;
            btn.addEventListener('click', handler);
        });
    }

    // Tab switching
    function attachTabEvents() {
        const btns = document.querySelectorAll('.tab-btn');

        btns.forEach(btn => {
            btn.removeEventListener('click', btn._tabListener);

            const handler = () => {
                const targetTab = btn.getAttribute('data-tab');

                document.querySelectorAll('.tab-pane').forEach(pane => {
                    pane.classList.remove('active');
                });
                btns.forEach(b => b.classList.remove('active'));

                btn.classList.add('active');

                const targetPane = document.getElementById(`${targetTab}Tab`);
                if (targetPane) {
                    targetPane.classList.add('active');
                }

                if (targetTab === 'timeline') {
                    requestAnimationFrame(() => {
                        renderRatingTimelineChart();
                        if (ratingChartInstance) ratingChartInstance.resize();
                    });
                }
            };

            btn._tabListener = handler;
            btn.addEventListener('click', handler);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Main initialization
    async function initPage() {
        const playerId = getPlayerIdFromUrl();
        if (!playerId) {
            document.getElementById('loadingView').innerHTML = `
                <div class="error-box">
                    <i class="fas fa-exclamation-triangle"></i> Missing player ID.<br>
                    Use ?id=3039 in the URL.
                </div>`;
            return;
        }
        
        try {
            const data = await fetchPlayerSummary(playerId);
            
            const fullHtml = `
                ${renderPlayerHeader(data)}
                ${renderStatsGrid(data.stats)}
                
                <div style="margin-bottom: 20px;">
                    <div style="display: flex; gap: 12px; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px;">
                        <button class="tab-btn active" data-tab="results">
                            <i class="fas fa-table-list"></i> Tournament Results
                        </button>
                        <button class="tab-btn" data-tab="timeline">
                            <i class="fas fa-chart-line"></i> Rating Timeline
                        </button>
                        <button class="tab-btn" data-tab="headtohead">
                            <i class="fas fa-users"></i> Head to Head
                        </button>
                    </div>
                    <div id="resultsTab" class="tab-pane active">
                        ${buildTournamentsTable(data.tournaments, playerId)}
                    </div>
                    <div id="timelineTab" class="tab-pane">
                        ${buildRatingTimelineTab(data.tournaments)}
                    </div>
                    <div id="headtoheadTab" class="tab-pane">
                        ${buildHeadToHeadPlaceholder()}
                    </div>
                </div>
                
                <div class="footer-note">
                    <i class="fas fa-database"></i> Data powered by WESPA API v2 | 
                    <i class="fas fa-mouse-pointer"></i> Click "Details" to load game-by-game results
                </div>
            `;
            
            document.getElementById('mainContent').innerHTML = fullHtml;
            document.getElementById('loadingView').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            
            attachLazyLoadEvents();
            attachTabEvents();
            
        } catch (err) {
            console.error(err);
            document.getElementById('loadingView').innerHTML = `
                <div class="error-box">
                    <i class="fas fa-circle-exclamation"></i> Failed to load player data: ${err.message}<br>
                    Make sure the API v2 endpoints are available.
                </div>`;
        }
    }
    
    // Start the app
    initPage();
</script>
</body>
</html>
